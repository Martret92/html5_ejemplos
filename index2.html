<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo</title>
    <meta name="Description" content="Este es un ejemplo de una pagina HTML básica.">
    <meta name="author" content="Jaime">
    <meta name="keywords" content="HTML, ejemplo, pagina web">
    <meta name="robots" content="index, follow">
    <!-- noindex nofollow -->

</head>     

<body>
    <header>
        <h1>Bienvenido a mi pagina web</h1>
        <p>Este es un ejemplo de una pagina HTML básica con meta etiquetas</p>
        <img 
        src="https://picsum.photos/200" 
        alt="imagen header"
        srcset="imagen-small.jpg 500w,
                imagen-medium.jpg 1000w
                imagen-large.jpg 1500w"
        loading="lazy"> 
        <!-- eager -->
    </header>
    <main>
        <section>
            <article>
                <h2>Artículo</h2>
                <p>Este es el contenido del primer articulo</p>
                
            </article>
        </section>

    </main>
</body>
</html>
